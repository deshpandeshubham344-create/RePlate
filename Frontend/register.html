<!DOCTYPE html>
<html>
<head>
  <title>Register - RePlate</title>

  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* ========= BODY ========= */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url("https://images.unsplash.com/photo-1490645935967-10de6ba17061");

  background-size: cover;
  background-position: center;
}

/* ========= CONTAINER ========= */
.container {
  width: 420px;
  max-height: 90vh;
  overflow-y: auto;

  padding: 35px 30px;

  border-radius: 18px;

  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.3);

  box-shadow: 0 20px 50px rgba(0,0,0,0.4);

  text-align: center;
  scroll-behavior: smooth;
}

/* ========= HEADING ========= */
h2 {
  font-size: 22px;
  margin-bottom: 20px;
  color: #e8f5e9;
  font-weight: 600;
}

/* ========= INPUTS ========= */
input, select, textarea {
  width: 100%;
  padding: 13px;

  margin: 8px 0;

  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.4);

  background: rgba(255,255,255,0.25);
  color: white;

  font-size: 14px;

  outline: none;
  transition: 0.3s;
}

/* placeholder */
input::placeholder,
textarea::placeholder {
  color: rgba(255,255,255,0.8);
}

/* focus */
input:focus,
select:focus,
textarea:focus {
  border-color: #66bb6a;
  background: rgba(255,255,255,0.35);

  box-shadow: 0 0 10px rgba(102,187,106,0.6);
}

/* ========= BUTTON ========= */
button {
  width: 100%;
  padding: 14px;

  background: linear-gradient(45deg,#2e7d32,#66bb6a);
  color: white;

  border: none;
  border-radius: 12px;

  font-size: 16px;
  font-weight: 600;

  cursor: pointer;

  box-shadow: 0 8px 20px rgba(46,125,50,0.4);

  transition: all 0.3s ease;

  margin-top: 10px;
}

/* hover */
button:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 12px 25px rgba(46,125,50,0.5);
}

/* click */
button:active {
  transform: scale(0.97);
}

/* ========= MAP BUTTON ========= */
.map-btn {
  background: linear-gradient(45deg,#1976d2,#42a5f5);
}

.map-btn:hover {
  box-shadow: 0 12px 25px rgba(25,118,210,0.5);
}

/* ========= TOGGLE ========= */
.toggle {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin: 10px 0;
}

.toggle button {
  width: 100%;
  padding: 10px;

  background: rgba(255,255,255,0.25);
  color: white;

  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.3);
}

.active {
  background: linear-gradient(45deg,#2e7d32,#66bb6a) !important;
  color: white !important;
}

/* ========= MESSAGE ========= */
#message {
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
  display: none;
  font-size: 14px;
}

.success {
  background-color: rgba(200,230,201,0.9);
  color: #1b5e20;
}

.error {
  background-color: rgba(255,205,210,0.9);
  color: #b71c1c;
}

/* ========= LOCATION TEXT ========= */
.location-text {
  font-size: 12px;
  color: #ddd;
}

/* ========= LINK ========= */
.link {
  margin-top: 15px;
  display: block;
  color: #c8e6c9;
  cursor: pointer;
  font-size: 14px;
}

.link:hover {
  text-decoration: underline;
}

/* ========= SCROLLBAR ========= */
.container::-webkit-scrollbar {
  width: 0px;
}

.container::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
}
/* Address Suggestions */

#suggestions{
  width:100%;
  max-height:180px;
  overflow-y:auto;
  background:rgba(255,255,255,0.15);
  border-radius:10px;
  margin-top:-5px;
  margin-bottom:10px;
  display:none;
}

.suggestion{
  padding:12px;
  cursor:pointer;
  text-align:left;
  color:white;
  border-bottom:1px solid rgba(255,255,255,.15);
  transition:.3s;
}

.suggestion:hover{
  background:rgba(255,255,255,.25);
}
  </style>
</head>

<body>

<div class="container">
  <h2>Register</h2>

  <input type="text" id="name" placeholder="Name" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <input type="text" id="phone" placeholder="Phone" />


  <!-- Search Address -->
  <input type="text" id="searchAddress" placeholder="Search Area, Road, City..." autocomplete="off" />
  
  <!-- Suggestions -->
  <div id="suggestions"></div>
  
  <!-- House / Flat -->
  <input type="text" id="houseAddress" placeholder="House / Flat / Shop No." />
  
  <!-- Landmark -->
  <div class="input-group">
    <input
        type="text"
        id="landmark"
        placeholder="Landmark (Optional)"
    />
    <div id="landmarkSuggestions" class="suggestions"></div>
</div>
  
  <!-- Map -->
    <button
    id="mapButton"
    class="map-btn"
    onclick="openMapSelector()">
    📍 Adjust Exact Location
  </button>
  <p id="selectedLocation" class="location-text"></p>

  <select id="role" onchange="handleRoleChange()">
    <option value="">Select Role</option>
    <option value="restaurant">Restaurant</option>
    <option value="ngo">NGO</option>
    <option value="volunteer">Volunteer</option>
  </select>

  <div id="vehicleField" style="display:none;">
    <input type="text" id="vehicleType" placeholder="Vehicle Type" />
  </div>

  <button onclick="registerUser()">Register</button>
  <span class="link" onclick="goLogin()">Already have an account? Login</span>

  <div id="message"></div>
</div>

<script>
let selectedLat = null;
let selectedLng = null;
let selectedAddress = "";

function enableAutoSearch(inputId, suggestionId, callback) {
    // Get the input element (searchAddress, landmark, etc.)
    const input = document.getElementById(inputId);
    // Each input gets its own debounce timer
    let timer;
    input.addEventListener("input", () => {
        // Cancel the previous timer if the user keeps typing
        clearTimeout(timer);
        // Wait 500ms after the user stops typing
        timer = setTimeout(() => {
            // Search using the reusable search function
            searchLocation(
                inputId,
                suggestionId,
                callback
            );
        }, 500);
    });
}
enableAutoSearch(
    "searchAddress",
    "suggestions",
    selectArea
);
enableAutoSearch(
      "landmark",
      "landmarkSuggestions",
      selectLandmark
);
function handleRoleChange() {
  const role = document.getElementById("role").value;
  document.getElementById("vehicleField").style.display =
    role === "volunteer" ? "block" : "none";
}

function openMapSelector() {
    let url = "map-select.html";
    if (selectedLat && selectedLng) {
        url += `?lat=${selectedLat}&lng=${selectedLng}`;
    }
    window.open(url, "_blank", "width=800,height=600");
}

// 🔥 Receive map location
window.addEventListener("message", async (event) => {
  const { lat, lng } = event.data;

  selectedLat = lat;
  selectedLng = lng;

  // 🔥 Convert to real address
  const res = await fetch(
    `https://api.openrouteservice.org/geocode/reverse?api_key=eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImRlMTQ1NWVmNTBjYzQ2MzA5ZTRiZGUwYjUwNDBiZTYwIiwiaCI6Im11cm11cjY0In0=&point.lon=${lng}&point.lat=${lat}`
  );

  const data = await res.json();

  let place = "Selected location";

  if (data.features && data.features.length > 0) {
    place = data.features[0].properties.label;
  }

  selectedAddress = place;
  document.getElementById("selectedLocation").innerText = "📍 " + place;
});

async function registerUser() {

  const msg = document.getElementById("message");
  msg.style.display = "none";

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const phone = document.getElementById("phone").value.trim();
  const role = document.getElementById("role").value;

  let vehicleType = null;

  if (role === "volunteer") {
    vehicleType = document.getElementById("vehicleType").value;
  }

  // Check if a location has been selected
  if (
    selectedLat === null ||
    selectedLng === null ||
    selectedAddress === ""
  ) {
    msg.className = "error";
    msg.innerText = "Please select a location on the map.";
    msg.style.display = "block";
    return;
  }

  try {

    console.log({
      name,
      email,
      password,
      phone,
      address: selectedAddress,
      role,
      vehicleType,
      lat: selectedLat,
      lng: selectedLng
    });

    const res = await fetch("http://localhost:5000/api/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        password,
        phone,
        address: selectedAddress,
        role,
        vehicleType,
        lat: selectedLat,
        lng: selectedLng
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.message);
    }

    msg.className = "success";
    msg.innerText = "Registered successfully!";
    msg.style.display = "block";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1000);

  } catch (err) {

    msg.className = "error";
    msg.innerText = err.message;
    msg.style.display = "block";

    console.error(err);
  }
}

async function searchLocation(inputId, suggestionId, selectCallback) {
    const query = document.getElementById(inputId).value.trim();
    const suggestionBox = document.getElementById(suggestionId);
    if (query.length < 3) {
        suggestionBox.style.display = "none";
        suggestionBox.innerHTML = "";
        return;
    }
    try {
        const res = await fetch(
            `http://localhost:5000/api/location/search?q=${encodeURIComponent(query)}`
        );
        const places = await res.json();
        showSuggestions(places, suggestionId, selectCallback);
    } catch (err) {
        console.log(err);
    }
}

function showSuggestions(places, suggestionId, selectCallback) {
    const suggestionBox = document.getElementById(suggestionId);
    suggestionBox.innerHTML = "";
    if (places.length === 0) {
        suggestionBox.style.display = "none";
        return;
    }
    suggestionBox.style.display = "block";
    places.forEach(place => {
        const div = document.createElement("div");
        div.className = "suggestion";
        div.innerText = place.display_name;
        div.onclick = () => selectCallback(place);
        suggestionBox.appendChild(div);
    });
}

function selectArea(place){

    selectedLat = Number(place.lat);
    selectedLng = Number(place.lon);
    selectedAddress = place.display_name;

    document.getElementById("searchAddress").value = place.display_name;

    document.getElementById("selectedLocation").innerText =
        "📍 " + place.display_name;

    document.getElementById("suggestions").style.display = "none";
    document.getElementById("suggestions").innerHTML = "";
    document.getElementById("mapButton").innerText =
      "📍 Adjust Exact Location";
}
function selectLandmark(place)
{
    document.getElementById("landmark").value = place.display_name;
    document.getElementById("landmarkSuggestions").style.display = "none";
    document.getElementById("landmarkSuggestions").innerHTML = "";
}
function goLogin() {
  window.location.href = "login.html";
}

</script>

</body>
</html>
